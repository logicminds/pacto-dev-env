name: Validate setup scripts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-ubuntu-setup:
    name: Ubuntu ${{ matrix.ubuntu }} setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['24.04', '26.04']

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build test image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: test/ubuntu-${{ matrix.ubuntu }}.Dockerfile
          load: true
          tags: pacto-ubuntu-${{ matrix.ubuntu }}-test:latest

      - name: Run setup script
        run: |
          docker run --rm \
            -e PACTO_CLONE_REPOS=skip \
            -e PACTO_SKIP_AZTEC_CLI=1 \
            pacto-ubuntu-${{ matrix.ubuntu }}-test:latest

      - name: Verify services compose
        run: |
          docker compose config > /dev/null

  test-debug-image:
    name: Build debug sidecar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build debug image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./docker
          file: ./docker/debug.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: pacto-debug:ci-test

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          severity: warning
          scandir: './'
        env:
          SHELLCHECK_OPTS: '-e SC1091 -e SC2002'
