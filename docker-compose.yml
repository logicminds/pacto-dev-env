services:
  # Nostr relay for local DM / MLS testing
  nostr-relay:
    build:
      context: ./docker
      dockerfile: nostr-relay.Dockerfile
    image: pacto-nostr-relay:local
    container_name: pacto-nostr-relay
    ports:
      - "7000:8080"
    volumes:
      - ./relay-config.toml:/usr/src/app/config.toml:ro
      - ./data/relay:/usr/src/app/db
    restart: unless-stopped

  # Local EVM testnet for pacto-gov / sponsor / security-manager contracts
  anvil:
    build:
      context: ./docker
      dockerfile: anvil.Dockerfile
    image: pacto-anvil:local
    container_name: pacto-anvil
    command:
      - "--block-time"
      - "2"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
    ports:
      - "8545:8545"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Aztec local network. Commented out by default: it needs ~8 GB RAM and
  # an L1 RPC URL. Uncomment when working on pacto-aztec.
  aztec-sandbox:
    build:
      context: ./docker
      dockerfile: aztec-sandbox.Dockerfile
    image: pacto-aztec:local
    container_name: pacto-aztec-sandbox
    profiles:
      - aztec
    command:
      - "start"
      - "--local-network"
      - "--port"
      - "8080"
      - "--admin-port"
      - "8880"
      - "--data-directory"
      - "/var/lib/aztec"
      - "--l1-rpc-urls"
      - "http://anvil:8545"
    ports:
      - "8080:8080"
      - "8880:8880"
    volumes:
      - ./data/aztec:/var/lib/aztec
    depends_on:
      anvil:
        condition: service_healthy
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # NIP-46 bunker (Bunker46 server only). Commented out by default:
  # uncomment and generate secrets in dev-setup/.env when you need bunker signing tests.
  nip46-bunker:
    build:
      context: ./docker
      dockerfile: nip46-bunker.Dockerfile
    image: pacto-nip46-bunker:local
    container_name: pacto-nip46-bunker
    profiles:
      - bunker
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://bunker46:bunker46@nip46-bunker-db:5432/bunker46
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-must-be-at-least-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-refresh-secret-must-be-at-least-32-characters-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme-encryption-key-must-be-at-least-32-characters-long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      REDIS_URL: redis://nip46-bunker-redis:6379
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Bunker46}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      NOSTR_DEFAULT_RELAYS: ${NOSTR_DEFAULT_RELAYS:-}
    depends_on:
      nip46-bunker-db:
        condition: service_healthy
      nip46-bunker-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/auth/config',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nip46-bunker-db:
    image: postgres:17-alpine
    container_name: pacto-nip46-bunker-db
    profiles:
      - bunker
    environment:
      POSTGRES_USER: bunker46
      POSTGRES_PASSWORD: bunker46
      POSTGRES_DB: bunker46
    volumes:
      - ./data/nip46-bunker-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunker46"]
      interval: 5s
      timeout: 5s
      retries: 5

  nip46-bunker-redis:
    image: redis:8-alpine
    container_name: pacto-nip46-bunker-redis
    profiles:
      - bunker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional debugging sidecar. Attach with:
  #   docker compose --profile debug up -d --build
  #   docker compose exec debug bash
  debug:
    build:
      context: ./docker
      dockerfile: debug.Dockerfile
    image: pacto-debug:local
    container_name: pacto-debug
    profiles:
      - debug
    stdin_open: true
    tty: true
